        // CONFIG ANDA (Dah saya masukkan siap-siap)
        const firebaseConfig = {
            apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",

            databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "testing-10bf6",

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // TEST: Hantar satu data bulatan ke Firebase

            cy: 200,

        alert("Data dihantar! Periksa Firebase anda.");
