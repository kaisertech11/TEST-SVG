<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Robotics | KR Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #fff; color: #000; overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: #fff; display: flex; align-items: center;
            justify-content: space-between; padding: 15px 50px;
            border-bottom: 1px solid #eee;
        }

        .logo { font-family: 'Oswald', sans-serif; font-size: 2rem; color: #000; text-decoration: none; }
        .logo span { color: #ed1c24; } /* Warna Merah KR */

        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: #000; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: #ed1c24; }

        .search-box { display: flex; align-items: center; background: #f4f4f4; padding: 8px 15px; border-radius: 5px; }
        .search-box input { border: none; background: none; outline: none; margin-left: 10px; width: 150px; }

        /* HERO SECTION (Full Page) */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding-left: 80px;
        }

        .hero-text { color: #fff; max-width: 500px; }
        .hero-text h1 { font-family: 'Oswald', sans-serif; font-size: 4rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-text p { font-size: 1.2rem; margin-bottom: 30px; font-weight: 300; }
        .btn-shop { 
            background: #ed1c24; color: #fff; padding: 15px 40px; 
            text-decoration: none; font-weight: bold; transition: 0.3s; 
        }
        .btn-shop:hover { background: #000; }

        /* PRODUCT SECTION (Hidden by default) */
        #product-section { padding: 100px 50px; display: none; background: #f9f9f9; }
        .section-title { text-align: center; font-family: 'Oswald', sans-serif; font-size: 2.5rem; margin-bottom: 50px; }
        
        .grid-robot { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }

        .robot-card { background: #fff; border: 1px solid #eee; padding: 15px; transition: 0.3s; }
        .robot-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .robot-image { width: 100%; height: 300px; object-fit: cover; }
        .robot-card h3 { margin: 15px 0 5px; font-size: 1.1rem; }
        .robot-card p { color: #ed1c24; font-weight: bold; margin-bottom: 15px; }

        .btn-add-cart { 
            width: 100%; padding: 10px; background: #000; color: #fff; border: none; cursor: pointer; 
        }

        /* CART COUNT BADGE */
        .cart-count { background: #ed1c24; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; vertical-align: top; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="showHome()">KR<span>.</span></a>
    
    <nav>
        <a href="#" onclick="showHome()">Home</a>
        <a href="#" onclick="showProducts()">Product</a>
        <a href="order.html">Order</a>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search Robot..." onkeyup="searchRobot()">
        </div>
        <a href="#"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cart-num">0</span></a>
    </nav>
</header>

<section id="home-section" class="hero">
    <div class="hero-text">
        <h1>FUTURE IS <br>IN YOUR HANDS.</h1>
        <p>Explore the next generation of KR Autonomous Systems.</p>
        <a href="#" class="btn-shop" onclick="showProducts()">SHOP NOW</a>
    </div>
</section>

<section id="product-section">
    <h2 class="section-title">OUR COLLECTION</h2>
    <div class="grid-robot" id="robot-list"></div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
        authDomain: "testing-10bf6.firebaseapp.com",
        databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "testing-10bf6",
        storageBucket: "testing-10bf6.firebasestorage.app",
        messagingSenderId: "15053573454",
        appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allRobots = [];
    let cartItems = 0;

    // Fungsi Tukar Page
    window.showProducts = function() {
        document.getElementById('home-section').style.display = 'none';
        document.getElementById('product-section').style.display = 'block';
    }

    window.showHome = function() {
        document.getElementById('home-section').style.display = 'flex';
        document.getElementById('product-section').style.display = 'none';
    }

    // Fungsi Add to Cart (Simple Logic)
    window.addToCart = function() {
        cartItems++;
        document.getElementById('cart-num').innerText = cartItems;
        alert("Added to cart!");
    }

    // Ambil Data Firebase
    onValue(ref(db, 'robot'), (snapshot) => {
        const data = snapshot.val();
        allRobots = Object.values(data);
        displayRobots(allRobots);
    });

    function displayRobots(robots) {
        const list = document.getElementById('robot-list');
        list.innerHTML = '';
        robots.forEach(r => {
            list.innerHTML += `
                <div class="robot-card">
                    <img src="${r.gambar}" class="robot-image">
                    <h3>${r.model}</h3>
                    <p>RM ${r.harga}</p>
                    <button class="btn-add-cart" onclick="addToCart()">ADD TO CART</button>
                </div>
            `;
        });
    }

    // Fungsi Search
    window.searchRobot = function() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allRobots.filter(r => r.model.toLowerCase().includes(term));
        displayRobots(filtered);
        showProducts(); // Auto-jump ke product page bila search
    }
</script>

</body>
</html>
