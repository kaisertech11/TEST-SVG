<!DOCTYPE html>
<html>
<head>
    <title>SVG Drawing Realtime</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        svg { background: white; border: 2px solid #333; margin-top: 20px; cursor: pointer; }
        .instruction { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h1>Canvas SVG Real-time</h1>
    <p class="instruction">Klik di dalam kotak putih untuk melukis bulatan!</p>
    
    <svg id="canvas" width="600" height="400"></svg>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Guna Config anda yang sedia ada
        const firebaseConfig = {
            apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
            authDomain: "testing-10bf6.firebaseapp.com",
            databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "testing-10bf6",
            storageBucket: "testing-10bf6.firebasestorage.app",
            messagingSenderId: "15053573454",
            appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const canvas = document.getElementById('canvas');

        // A. FUNGSI KLIK: Hantar koordinat ke Firebase
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const lukisanRef = ref(db, 'lukisan');
            const newShapeRef = push(lukisanRef); 
            
            set(newShapeRef, {
                cx: x,
                cy: y,
                r: 25,
                fill: "hsl(" + Math.random() * 360 + ", 70%, 50%)" // Warna rawak!
            });
        });

        // B. FUNGSI LIVE UPDATE: Lukis balik bila data di Firebase berubah
        onValue(ref(db, 'lukisan'), (snapshot) => {
            canvas.innerHTML = ''; // Bersihkan canvas
            const data = snapshot.val();
            
            for (let id in data) {
                const shape = data[id];
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", shape.cx);
                circle.setAttribute("cy", shape.cy);
                circle.setAttribute("r", shape.r);
                circle.setAttribute("fill", shape.fill);
                canvas.appendChild(circle);
            }
        });
    </script>
</body>
</html>
