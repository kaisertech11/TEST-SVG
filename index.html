<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Robotics - High Tech Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { font-family: 'Rajdhani', sans-serif; margin: 0; background: #050505; color: #fff; overflow-x: hidden; }
        header { background: #000; border-bottom: 2px solid #00f2ff; padding: 40px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        h1 { font-family: 'Orbitron', sans-serif; margin: 0; letter-spacing: 5px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        .grid-robot { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; padding: 50px; 
        }

        .robot-card { 
            background: #111; border: 1px solid #222; border-radius: 20px; 
            padding: 20px; transition: 0.4s; display: flex; flex-direction: column;
        }

        .robot-card:hover { border-color: #00f2ff; transform: translateY(-5px); }
        
        .robot-image { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; background: #000; }
        
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #00f2ff; margin: 15px 0; }
        
        .price { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; font-family: 'Orbitron', sans-serif; }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-detail { 
            flex: 1; background: #222; color: #fff; border: 1px solid #444; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-detail:hover { background: #333; border-color: #00f2ff; }

        .btn-order { 
            flex: 1; background: #00f2ff; color: #000; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-order:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* MODAL SYSTEM */
        .modal {
            display: none; position: fixed; z-index: 999; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px); align-items: center; justify-content: center;
        }

        .modal-content {
            background: #111; width: 90%; max-width: 900px; border-radius: 25px;
            border: 2px solid #00f2ff; display: flex; overflow: hidden; position: relative;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-modal {
            position: absolute; top: 20px; right: 25px; font-size: 30px;
            cursor: pointer; color: #fff; z-index: 10;
        }

        .modal-left { width: 50%; background: #000; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }

        .modal-right { width: 50%; padding: 40px; display: flex; flex-direction: column; }
        
        .modal-right h2 { font-size: 2rem; margin-top: 0; }
        .detail-list { list-style: none; padding: 0; margin: 25px 0; }
        .detail-list li { margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .detail-list span { color: #00f2ff; font-weight: bold; margin-right: 10px; }

        /* Mobile View Modal */
        @media (max-width: 768px) {
            .modal-content { flex-direction: column; width: 95%; height: 80vh; overflow-y: auto; }
            .modal-left, .modal-right { width: 100%; }
            .modal-left { height: 300px; }
        }
    </style>
</head>
<body>

<header>
    <h1>KAISER ROBOTICS</h1>
    <p>Sistem Automasi Masa Depan</p>
</header>

<div class="grid-robot" id="robot-list"></div>

<div id="robotModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-left">
            <img id="modalImg" src="">
        </div>
        <div class="modal-right">
            <h2 id="modalTitle"></h2>
            <ul class="detail-list">
                <li><span>PROCESSOR:</span> <span id="modalProc" style="color:#fff; font-weight: normal;"></span></li>
                <li><span>BATERI:</span> <span id="modalBatt" style="color:#fff; font-weight: normal;"></span></li>
                <li><span>FUNGSI UTAMA:</span> <span id="modalFunc" style="color:#fff; font-weight: normal;"></span></li>
            </ul>
            <p style="color: #888; line-height: 1.6;"><strong>CARA GUNA:</strong> Sambungkan unit ke Kaiser Hub, muat turun profil AI yang diperlukan, dan tetapkan mod operasi melalui arahan suara atau aplikasi mudah alih.</p>
            <div class="price" id="modalPrice"></div>
            <button class="btn-order" onclick="window.location.href='order.html'">PRE-ORDER NOW</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
        authDomain: "testing-10bf6.firebaseapp.com",
        databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "testing-10bf6",
        storageBucket: "testing-10bf6.firebasestorage.app",
        messagingSenderId: "15053573454",
        appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const list = document.getElementById('robot-list');

    window.openModal = function(model, img, proc, batt, func, price) {
        document.getElementById('modalTitle').innerText = model;
        document.getElementById('modalImg').src = img;
        document.getElementById('modalProc').innerText = proc;
        document.getElementById('modalBatt').innerText = batt;
        document.getElementById('modalFunc').innerText = func;
        document.getElementById('modalPrice').innerText = "RM " + price;
        document.getElementById('robotModal').style.display = "flex";
    }

    window.closeModal = function() {
        document.getElementById('robotModal').style.display = "none";
    }

    onValue(ref(db, 'robot'), (snapshot) => {
        list.innerHTML = '';
        const data = snapshot.val();
        for (let id in data) {
            const r = data[id];
            list.innerHTML += `
                <div class="robot-card">
                    <img src="${r.gambar}" class="robot-image">
                    <h2>${r.model}</h2>
                    <div class="price">RM ${r.harga}</div>
                    <div class="btn-group">
                        <button class="btn-detail" onclick="openModal('${r.model}', '${r.gambar}', '${r.processor}', '${r.bateri}', '${r.fungsi}', '${r.harga}')">VIEW DETAILS</button>
                        <button class="btn-order" onclick="window.location.href='order.html'">PRE-ORDER</button>
                    </div>
                </div>
            `;
        }
    });
</script>
</body>
</html>
