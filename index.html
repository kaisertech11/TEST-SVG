<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Robotics | KR Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #fff; color: #000; overflow-x: hidden; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: #fff; display: flex; align-items: center;
            justify-content: space-between; padding: 15px 50px;
            border-bottom: 1px solid #eee;
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 2.2rem; color: #000; text-decoration: none; font-weight: bold; }
        .logo span { color: #ed1c24; }

        nav { display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: #000; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        
        .search-box { display: flex; align-items: center; background: #f4f4f4; padding: 8px 15px; border-radius: 4px; }
        .search-box input { border: none; background: none; outline: none; margin-left: 10px; width: 120px; }

        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count { 
            position: absolute; top: -8px; right: -10px; background: #ed1c24; 
            color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; 
        }

        /* HERO SECTION */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding-left: 80px;
        }
        .hero-text { color: #fff; }
        .hero-text h1 { font-family: 'Oswald', sans-serif; font-size: 4.5rem; line-height: 1; margin-bottom: 20px; }
        .btn-shop { background: #ed1c24; color: #fff; padding: 15px 45px; text-decoration: none; font-weight: bold; display: inline-block; }

        /* PRODUCT GRID */
        #product-section { padding: 100px 50px; display: none; }
        .grid-robot { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .robot-card { border: 1px solid #eee; padding: 15px; text-align: left; transition: 0.3s; }
        .robot-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .robot-image { width: 100%; height: 320px; object-fit: cover; margin-bottom: 15px; }
        .robot-card h3 { font-family: 'Oswald', sans-serif; font-size: 1.2rem; margin-bottom: 5px; }
        .price { color: #ed1c24; font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; }
        .btn-add { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; }

        /* CART SIDEBAR (Shopee Style) */
        .cart-sidebar {
            position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
            background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.4s; padding: 30px; display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .cart-items-list { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; }
        .cart-total { padding-top: 20px; border-top: 2px solid #000; }
        .btn-checkout { width: 100%; padding: 15px; background: #ed1c24; color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="showHome()">KR<span>.</span></a>
    <nav>
        <a onclick="showHome()">Home</a>
        <a onclick="showProducts()">Product</a>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchRobot()">
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" id="cart-num">0</span>
        </div>
    </nav>
</header>

<section id="home-section" class="hero">
    <div class="hero-text">
        <h1>FUTURE IS <br>IN YOUR HANDS.</h1>
        <p style="margin-bottom: 30px; font-weight: 300;">Explore the next generation of KR Autonomous Systems.</p>
        <a href="#" class="btn-shop" onclick="showProducts()">SHOP NOW</a>
    </div>
</section>

<section id="product-section">
    <div class="grid-robot" id="robot-list"></div>
</section>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2 style="font-family: 'Oswald';">YOUR CART</h2>
        <i class="fas fa-times" style="cursor:pointer" onclick="toggleCart()"></i>
    </div>
    <div class="cart-items-list" id="cartItemList">
        </div>
    <div class="cart-total">
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>TOTAL:</span>
            <span id="totalPrice">RM 0</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">ORDER VIA WHATSAPP</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
        authDomain: "testing-10bf6.firebaseapp.com",
        databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "testing-10bf6",
        storageBucket: "testing-10bf6.firebasestorage.app",
        messagingSenderId: "15053573454",
        appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allRobots = [];
    let cart = [];

    // TUKAR PAGE
    window.showProducts = () => {
        document.getElementById('home-section').style.display = 'none';
        document.getElementById('product-section').style.display = 'block';
    }
    window.showHome = () => {
        document.getElementById('home-section').style.display = 'flex';
        document.getElementById('product-section').style.display = 'none';
    }

    // CART LOGIC
    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('active');

    window.addToCart = (model, harga, gambar) => {
        cart.push({model, harga, gambar});
        updateCartUI();
        document.getElementById('cartSidebar').classList.add('active');
    }

    function updateCartUI() {
        const list = document.getElementById('cartItemList');
        const num = document.getElementById('cart-num');
        const totalDisp = document.getElementById('totalPrice');
        
        list.innerHTML = '';
        let total = 0;
        
        cart.forEach((item, index) => {
            total += parseFloat(item.harga.replace(/,/g, ''));
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.gambar}">
                    <div>
                        <h4 style="font-size:0.9rem">${item.model}</h4>
                        <p style="color:#ed1c24; font-size:0.8rem">RM ${item.harga}</p>
                        <small style="color:blue; cursor:pointer" onclick="removeItem(${index})">Remove</small>
                    </div>
                </div>
            `;
        });
        
        num.innerText = cart.length;
        totalDisp.innerText = "RM " + total.toLocaleString();
    }

    window.removeItem = (index) => {
        cart.splice(index, 1);
        updateCartUI();
    }

    // CHECKOUT WHATSAPP
    window.checkout = () => {
        if(cart.length === 0) return alert("Cart kosong!");
        
        let message = "Helo Kaiser Robotics! Saya ingin order:%0A";
        cart.forEach(item => {
            message += `- ${item.model} (RM ${item.harga})%0A`;
        });
        message += `%0ATotal: ${document.getElementById('totalPrice').innerText}`;
        
        // Bawa ke page pilihan platform dulu atau terus ke WhatsApp
        window.location.href = `https://wa.me/60172883237?text=${message}`;
    }

    // FIREBASE DATA
    onValue(ref(db, 'robot'), (snapshot) => {
        const data = snapshot.val();
        allRobots = Object.values(data);
        displayRobots(allRobots);
    });

    function displayRobots(robots) {
        const list = document.getElementById('robot-list');
        list.innerHTML = '';
        robots.forEach(r => {
            list.innerHTML += `
                <div class="robot-card">
                    <img src="${r.gambar}" class="robot-image">
                    <h3>${r.model}</h3>
                    <div class="price">RM ${r.harga}</div>
                    <button class="btn-add" onclick="addToCart('${r.model}', '${r.harga}', '${r.gambar}')">ADD TO CART</button>
                </div>
            `;
        });
    }

    window.searchRobot = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allRobots.filter(r => r.model.toLowerCase().includes(term));
        displayRobots(filtered);
        showProducts();
    }
</script>

</body>
</html>
