<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Robotics - Future is Now</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { font-family: 'Rajdhani', sans-serif; margin: 0; background: #0a0a0a; color: #fff; }
        header { background: #111; border-bottom: 2px solid #00f2ff; padding: 40px; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; margin: 0; letter-spacing: 5px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        .grid-robot { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; padding: 40px; 
        }

        .robot-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 15px; 
            padding: 20px; transition: 0.4s; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .robot-card:hover { border-color: #00f2ff; transform: translateY(-10px); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        
        .robot-image { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #00f2ff; margin: 15px 0; }
        .specs { list-style: none; padding: 0; font-size: 0.9rem; color: #ccc; }
        .specs li { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .price { font-size: 1.5rem; font-weight: bold; margin: 20px 0; font-family: 'Orbitron', sans-serif; }

        .btn-order { 
            background: #00f2ff; color: #000; border: none; padding: 15px; 
            font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-order:hover { background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

<header>
    <h1>KAISER ROBOTICS</h1>
    <p>Sistem Automasi Masa Depan</p>
</header>

<div class="grid-robot" id="robot-list">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
        authDomain: "testing-10bf6.firebaseapp.com",
        databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "testing-10bf6",
        storageBucket: "testing-10bf6.firebasestorage.app",
        messagingSenderId: "15053573454",
        appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const list = document.getElementById('robot-list');

    onValue(ref(db, 'robot'), (snapshot) => {
        list.innerHTML = '';
        const data = snapshot.val();
        for (let id in data) {
            const r = data[id];
            list.innerHTML += `
                <div class="robot-card">
                    <img src="${r.gambar}" class="robot-image">
                    <h2>${r.model}</h2>
                    <ul class="specs">
                        <li>🔋 ${r.bateri}</li>
                        <li>🧠 ${r.processor}</li>
                        <li>🛠️ ${r.fungsi}</li>
                    </ul>
                    <div class="price">RM ${r.harga}</div>
                    <button class="btn-order" onclick="window.location.href='order.html'">PRE-ORDER NOW</button>
                </div>
            `;
        }
    });
</script>
</body>
</html>
