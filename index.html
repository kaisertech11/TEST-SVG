<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Robotics | Future is Now</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); display: flex; align-items: center;
            justify-content: space-between; padding: 15px 50px;
            border-bottom: 2px solid #ed1c24; backdrop-filter: blur(10px);
        }

        .back-btn {
            display: none; align-items: center; gap: 8px; color: #fff; cursor: pointer;
            font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid #ed1c24;
            padding: 5px 12px; background: rgba(237, 28, 36, 0.1);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; text-decoration: none; font-weight: bold; }
        .logo span { color: #ed1c24; text-shadow: 0 0 10px #ed1c24; }

        /* PRODUCT CARD IMPROVEMENTS */
        .grid-robot { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 0; }
        .robot-card { 
            background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; 
            transition: 0.4s; display: flex; flex-direction: column;
        }
        .robot-image { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .robot-details { margin-bottom: 15px; font-size: 0.9rem; color: #ccc; flex-grow: 1; }
        .robot-details p { margin: 5px 0; display: flex; align-items: center; gap: 10px; }
        .robot-details i { color: #ed1c24; width: 15px; }
        .btn-add { 
            width: 100%; padding: 12px; background: transparent; color: #00f2ff; border: 1px solid #00f2ff;
            font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s;
        }
        .btn-add:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }

        /* CARA PENGGUNAAN SECTION */
        .how-to-order { background: rgba(237, 28, 36, 0.05); padding: 50px; border-radius: 20px; margin-top: 50px; border: 1px solid #333; }
        .steps-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .step { text-align: center; padding: 20px; }
        .step i { font-size: 2.5rem; color: #ed1c24; margin-bottom: 15px; }
        .step h4 { font-family: 'Orbitron'; margin-bottom: 10px; }

        /* CART ITEM FIX */
        .cart-item { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px; 
            background: #1a1a1a; padding: 10px; border-radius: 8px; border-left: 3px solid #ed1c24;
        }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .cart-info h4 { font-size: 0.9rem; font-family: 'Orbitron'; }
        .cart-info p { color: #ed1c24; font-weight: bold; }

        /* SLIDER & SECTIONS */
        .slider-container { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        #product-section { padding: 120px 50px; display: none; }
        .cart-sidebar { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: #0a0a0a; border-left: 2px solid #ed1c24; z-index: 2000; transition: 0.5s; padding: 30px; display: flex; flex-direction: column; }
        .cart-sidebar.active { right: 0; }
    </style>
</head>
<body>

<header>
    <div id="btnBack" class="back-btn" onclick="showHome()"><i class="fas fa-chevron-left"></i> BACK</div>
    <a href="#" class="logo">KR<span>.</span></a>
    <nav>
        <div class="cart-icon" onclick="toggleCart()" style="position:relative; cursor:pointer; color:#ed1c24; font-size:1.4rem;">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount" style="position:absolute; top:-10px; right:-12px; background:#fff; color:#ed1c24; font-size:11px; padding:2px 7px; border-radius:50%; font-weight:bold;">0</span>
        </div>
    </nav>
</header>

<div id="home-page">
    <div class="slider-container" style="background: url('https://img.freepik.com/premium-photo/industrial-robot-cinematic-glory-generative-ai_506134-6244.jpg') center/cover; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; z-index:10;">
            <h1 style="font-family:'Orbitron'; font-size:4rem; text-shadow: 0 0 20px #ed1c24;">EVOLUTION</h1>
            <p style="letter-spacing:5px; color:#ed1c24; font-weight:bold;">KAISER ROBOTICS TECH</p>
            <button onclick="showProducts()" style="margin-top:30px; padding:15px 40px; background:#ed1c24; border:none; color:#fff; font-family:'Orbitron'; cursor:pointer; font-weight:bold;">SHOP NOW</button>
        </div>
    </div>
</div>

<section id="product-section">
    <h2 style="font-family:'Orbitron'; color:#ed1c24; text-align:center; font-size:2.5rem; margin-bottom:40px;">THE COLLECTION</h2>
    
    <div class="grid-robot" id="robotDisplay"></div>

    <div class="how-to-order">
        <h3 style="font-family:'Orbitron'; text-align:center; color:#ed1c24;">HOW TO ORDER</h3>
        <div class="steps-container">
            <div class="step">
                <i class="fas fa-robot"></i>
                <h4>Pilih Robot</h4>
                <p>Layari koleksi teknologi futuristik kami.</p>
            </div>
            <div class="step">
                <i class="fas fa-cart-plus"></i>
                <h4>Tambah Troli</h4>
                <p>Klik 'PRE-ORDER NOW' untuk simpan pilihan.</p>
            </div>
            <div class="step">
                <i class="fab fa-whatsapp"></i>
                <h4>WhatsApp</h4>
                <p>Hantar pesanan terus ke team pakar kami.</p>
            </div>
        </div>
    </div>
</section>

<div class="cart-sidebar" id="cartSidebar">
    <h2 style="font-family:'Orbitron'; border-bottom:2px solid #ed1c24; padding-bottom:10px;">YOUR CART</h2>
    <div id="cartItemsList" style="flex:1; overflow-y:auto; margin-top:20px;"></div>
    <div style="margin-top:auto; padding-top:20px; border-top:2px solid #ed1c24;">
        <div style="display:flex; justify-content:space-between; font-size:1.2rem; font-weight:bold;">
            <span>TOTAL:</span><span id="totalPrice">RM 0</span>
        </div>
        <button onclick="checkout()" style="width:100%; padding:15px; background:#ed1c24; color:#fff; border:none; margin-top:15px; font-weight:bold; cursor:pointer;">ORDER VIA WHATSAPP</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
        authDomain: "testing-10bf6.firebaseapp.com",
        databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "testing-10bf6",
        storageBucket: "testing-10bf6.firebasestorage.app",
        messagingSenderId: "15053573454",
        appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let allRobots = [];
    let cart = [];

    window.showProducts = () => {
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('product-section').style.display = 'block';
        document.getElementById('btnBack').style.display = 'flex';
        window.scrollTo(0,0);
    }

    window.showHome = () => {
        document.getElementById('home-page').style.display = 'block';
        document.getElementById('product-section').style.display = 'none';
        document.getElementById('btnBack').style.display = 'none';
    }

    onValue(ref(db, 'robot'), (snapshot) => {
        allRobots = Object.values(snapshot.val());
        const display = document.getElementById('robotDisplay');
        display.innerHTML = '';
        allRobots.forEach((r, index) => {
            display.innerHTML += `
                <div class="robot-card">
                    <img src="${r.gambar}" class="robot-image">
                    <h3 style="font-family:'Orbitron'; color:#00f2ff;">${r.model}</h3>
                    <div class="robot-details">
                        <p><i class="fas fa-battery-full"></i> ${r.bateri || 'Standard Cell'}</p>
                        <p><i class="fas fa-microchip"></i> ${r.chip || 'AI Processor'}</p>
                        <p><i class="fas fa-tools"></i> ${r.fungsi || 'General Purpose'}</p>
                    </div>
                    <p style="color:#fff; font-weight:bold; font-size:1.3rem; margin-bottom:15px;">RM ${r.harga}</p>
                    <button class="btn-add" onclick="addToCart(${index})">PRE-ORDER NOW</button>
                </div>`;
        });
    });

    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('active');

    window.addToCart = (idx) => {
        cart.push(allRobots[idx]);
        renderCart();
        document.getElementById('cartSidebar').classList.add('active');
    }

    function renderCart() {
        const list = document.getElementById('cartItemsList');
        list.innerHTML = '';
        let total = 0;
        cart.forEach((item, i) => {
            total += parseFloat(item.harga.replace(/,/g, ''));
            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.gambar}">
                    <div class="cart-info">
                        <h4>${item.model}</h4>
                        <p>RM ${item.harga}</p>
                        <small style="color:#777; cursor:pointer;" onclick="removeFromCart(${i})">Remove</small>
                    </div>
                </div>`;
        });
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('totalPrice').innerText = "RM " + total.toLocaleString();
    }

    window.removeFromCart = (i) => { cart.splice(i, 1); renderCart(); }

    window.checkout = () => {
        let text = "SAYA INGIN ORDER:%0A";
        cart.forEach(item => text += `- ${item.model}%0A`);
        window.location.href = `https://wa.me/60172883237?text=${text}`;
    }
</script>
</body>
</html>
