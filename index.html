<!DOCTYPE html>
<html>
<head>
    <title>SVG Dashify Realtime</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        svg { background: white; border: 2px solid #333; cursor: crosshair; }
    </script>
</head>
<body>
    <h1>Klik pada kotak untuk lukis bulatan!</h1>
    
    <svg id="canvas" width="600" height="400"></svg>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD18XzFVKsqnNl4_HbBZkhxqsVQFhf-BII",
            authDomain: "testing-10bf6.firebaseapp.com",
            databaseURL: "https://testing-10bf6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "testing-10bf6",
            storageBucket: "testing-10bf6.firebasestorage.app",
            messagingSenderId: "15053573454",
            appId: "1:15053573454:web:ff0b96d94cb2c41132621f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const canvas = document.getElementById('canvas');

        // 1. Fungsi bila kita KLIK kat kotak SVG
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Hantar koordinat x & y ke Firebase
            const lukisanRef = ref(db, 'lukisan');
            const newShapeRef = push(lukisanRef); // Guna push supaya boleh buat banyak
            set(newShapeRef, {
                type: 'circle',
                cx: x,
                cy: y,
                r: 20,
                fill: 'red'
            });
        });

        // 2. Fungsi untuk LUKIS balik apa yang ada kat Firebase secara automatik
        onValue(ref(db, 'lukisan'), (snapshot) => {
            canvas.innerHTML = ''; // Kosongkan dulu
            const data = snapshot.val();
            for (let id in data) {
                const shape = data[id];
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", shape.cx);
                circle.setAttribute("cy", shape.cy);
                circle.setAttribute("r", shape.r);
                circle.setAttribute("fill", shape.fill);
                canvas.appendChild(circle);
            }
        });
    </script>
</body>
</html>
